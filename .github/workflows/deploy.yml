name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Deploy to VPS (Docker Swarm)
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          envs:
            POSTGRES_PASSWORD,MINIMAX_API_KEY
          script: |
            cd /home/opsmgr/stacks/appsgeap

            # Ensure frontend network exists
            docker network create frontend 2>/dev/null || true
            docker network create backend 2>/dev/null || true

            # Pull latest code
            git pull origin main

            # Export env vars for docker-compose
            export POSTGRES_USER=${POSTGRES_USER:-postgres}
            export POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            export MINIMAX_API_KEY="$MINIMAX_API_KEY"

            # Build and deploy stack
            docker build -t sgeap-backend:latest -f Dockerfile.backend .
            docker build -t sgeap-frontend:latest -f Dockerfile.frontend .

            # Remove old stack if exists
            docker stack rm sgeap 2>/dev/null || true
            sleep 5

            # Deploy
            docker stack deploy -c docker-compose.prod.yml sgeap

            echo "Deploy completed!"
            docker stack ps sgeap