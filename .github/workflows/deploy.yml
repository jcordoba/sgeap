name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            cd /var/www/sgeap
            git pull origin main
            cd backend
            pip install -r requirements.txt --quiet
            systemctl restart sgeap-backend || (pkill -f uvicorn; nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 &)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            rm -rf /var/www/sgeap/frontend/out
            cp -r ${{ github.workspace }}/frontend/out /var/www/sgeap/frontend/
            # Or if using nginx serving static files:
            # cp -r ${{ github.workspace }}/frontend/out/* /var/www/sgeap/public/
